name: Audit Hunt Scanner

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install "git+https://github.com/Bunsly/JobSpy.git" "google-genai>=0.8.0" pandas requests

      - name: Run scanner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python master_hunter.py

      - name: Commit updated CSV
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add Scored_Audit_Leads.csv
          git diff --cached --quiet || git commit -m 'chore: update leads [skip ci]'
          git push
