name: Audit Hunt Scanner

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # manual trigger

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install python-jobspy pandas requests python-dotenv groq

      - name: Run scanner
        env:
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
          NTFY_TOPIC:      ${{ secrets.NTFY_TOPIC }}
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:     ${{ github.repository }}
        run: python master_hunter.py

      - name: Commit updated CSV
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add Scored_Audit_Leads.csv
          git diff --cached --quiet || git commit -m "chore: auto-scan $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
